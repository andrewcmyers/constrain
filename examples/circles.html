<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Packing circles</title>
  <script src="../numeric-1.2.6.js"></script>
  <script src="../constrain.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 2em;
      background: #f4f4f0;
    }
    h1 { color: #336; margin-bottom: 0.3em }
    p.subtitle { color: #666; font-size: 11pt; margin-top: 0 }
    canvas { background: white; border: 0px solid #800 }
    pre { background: #ffe; padding: 1em }
  </style>
</head>
<body>
<h1>Circles</h1>

<p>
Packing three circles in a square.
</p>

<canvas id="circles" style="width: 500px; height: 500px"></canvas>


<script id=script>
with (new Constrain.Figure("circles")) {
  setFillStyle('#ccc')
  let c1 = circle(), c2 = circle(), c3 = circle()
  let m = margin(0)
  align("left", "bottom", c1, m)
  align("right", "none", c2, m)
  align("none", "top", c3, m)

  equal(c1.w(), c2.w(), c3.w(),
        distance(c1, c2), distance(c1, c3), distance(c2, c3))

  output(c1.w(),
      diameter =>
        document.getElementById('diameter').innerText = (diameter/500))
  start()
}
</script>

<p>
Diameter of circle is <span id=diameter>?</span>
</p>
<p>Code:</p>
<pre id="code">
</pre>
<script>
  document.getElementById('code').innerText =
  document.getElementById('script').innerText
</script>

</body>
</html>
